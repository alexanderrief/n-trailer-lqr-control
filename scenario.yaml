# Scenario configuration — loaded by ntrailer/scenario.py (cached).
# Keep trajectory T in sync with end time in regimes/default.sreg.

n_trailers: 2
hitch_lengths_m:  [0.08]   # d_1 ... d_n
axle_distances_m: [0.19]   # l_2 ... l_{n+1}
# Lists shorter than n_trailers repeat the last value.

deflection_deg: 0.0
# Joint-angle offset [deg] at t=0 on top of the reference state.

# Trajectory: driven forward, then reversed for backward driving.
# type: bezier | waypoint | circle  (see commented examples below)

trajectory:
  type: waypoint
  waypoints:
    - [0.0, 0.0]
    - [1.0, 0.6]
    - [2.0, 0.0]
    - [1.0, -0.5]
    - [4.0, -2.0]
    - [0.0, -3.0]
    - [-1.0, -1.0]
    - [-1.0, 0.5]
    - [1.0, 0.5]
  T: 30.0
  bc_type: natural

